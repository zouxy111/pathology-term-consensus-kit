name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Install
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: Test
        run: uv run pytest -q

